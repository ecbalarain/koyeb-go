<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OXLOOK Admin</title>
  <!-- Tailwind (standalone) -->
  <script src="/tw.js"></script>
  <meta name="description" content="Admin dashboard for OXLOOK e-commerce platform." />
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
  <!-- Top bar -->
  <header class="sticky top-0 z-30 border-b border-zinc-200/70 bg-white/75 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center gap-3 px-4 py-3 sm:px-6">
      <!-- Brand -->
      <a href="/admin" class="flex items-center gap-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-zinc-900/20">
        <span class="text-sm font-semibold tracking-tight sm:text-base">OXLOOK ADMIN</span>
      </a>

      <div class="flex-1"></div>

      <!-- User menu -->
      <div class="flex items-center gap-2">
        <span class="text-sm text-zinc-600">Admin</span>
        <button id="logoutBtn" class="rounded-xl border border-zinc-200 bg-white px-3 py-2 text-sm text-zinc-600 shadow-sm hover:bg-zinc-50 focus:outline-none focus:ring-2 focus:ring-zinc-900/20" type="button">
          Logout
        </button>
      </div>
    </div>
  </header>

  <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-10">
    <div class="flex gap-6">
      <!-- Sidebar -->
      <aside class="hidden w-64 shrink-0 lg:block">
        <nav class="space-y-1">
          <a href="/admin" class="nav-link" data-page="products">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21V7a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v14"/><path d="M4 21h16"/><path d="M9 11h6"/><path d="M9 15h6"/></svg>
            Products
          </a>
          <a href="/admin/orders" class="nav-link" data-page="orders">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.05 2.05h2l2.6 12.3a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6l1.7-8.7H6.2"/></svg>
            Orders
          </a>
        </nav>
      </aside>

      <!-- Main content -->
      <main class="flex-1 min-w-0">
        <!-- Page content will be loaded here -->
        <div id="pageContent">
          <!-- Loading state -->
          <div class="flex items-center justify-center py-12">
            <div class="text-center">
              <div class="mx-auto h-8 w-8 animate-spin rounded-full border-2 border-zinc-900 border-t-transparent"></div>
              <p class="mt-3 text-sm text-zinc-600">Loading...</p>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Mobile menu drawer -->
  <div id="mobileMenu" class="fixed inset-0 z-40 hidden lg:hidden">
    <div class="absolute inset-0 bg-zinc-900/30" data-close></div>
    <div class="absolute left-0 top-0 h-full w-64 bg-white shadow-2xl">
      <div class="flex items-center justify-between border-b border-zinc-200 px-4 py-3">
        <p class="text-sm font-semibold">Menu</p>
        <button class="rounded-xl p-2 hover:bg-zinc-100 focus:outline-none focus:ring-2 focus:ring-zinc-900/20" data-close aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="px-4 py-4 space-y-1">
        <a href="/admin" class="nav-link" data-page="products">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21V7a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v14"/><path d="M4 21h16"/><path d="M9 11h6"/><path d="M9 15h6"/></svg>
          Products
        </a>
        <a href="/admin/orders" class="nav-link" data-page="orders">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.05 2.05h2l2.6 12.3a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6l1.7-8.7H6.2"/></svg>
          Orders
        </a>
      </nav>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="pointer-events-none fixed bottom-4 left-1/2 z-50 hidden -translate-x-1/2">
    <div class="rounded-2xl bg-zinc-900 px-4 py-2.5 text-sm text-white shadow-lg">Success</div>
  </div>

  <style>
    /* Navigation links */
    .nav-link {
      @apply flex items-center gap-3 rounded-2xl px-3 py-2.5 text-sm text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900 focus:outline-none focus:ring-2 focus:ring-zinc-900/20;
    }
    .nav-link.active {
      @apply bg-zinc-900 text-white hover:bg-zinc-800;
    }

    /* Form styles */
    .form-input {
      @apply w-full rounded-2xl border border-zinc-200 bg-white px-3 py-2.5 text-sm shadow-sm placeholder:text-zinc-400 focus:border-zinc-300 focus:outline-none focus:ring-4 focus:ring-zinc-900/10;
    }

    .form-label {
      @apply block text-sm font-medium text-zinc-700 mb-1.5;
    }

    .btn-primary {
      @apply inline-flex items-center rounded-2xl bg-zinc-900 px-4 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-zinc-800 focus:outline-none focus:ring-4 focus:ring-zinc-900/20;
    }

    .btn-secondary {
      @apply inline-flex items-center rounded-2xl border border-zinc-200 bg-white px-4 py-2.5 text-sm font-medium text-zinc-800 shadow-sm hover:bg-zinc-50 focus:outline-none focus:ring-4 focus:ring-zinc-900/10;
    }

    /* Status badges */
    .status-new { @apply bg-blue-100 text-blue-800; }
    .status-confirmed { @apply bg-yellow-100 text-yellow-800; }
    .status-shipped { @apply bg-green-100 text-green-800; }
    .status-canceled { @apply bg-red-100 text-red-800; }

    /* Table styles */
    .table {
      @apply w-full text-sm;
    }

    .table th {
      @apply border-b border-zinc-200 bg-zinc-50 px-4 py-3 text-left font-medium text-zinc-900;
    }

    .table td {
      @apply border-b border-zinc-200 px-4 py-3 text-zinc-700;
    }
  </style>

  <script>
    // --- Global state ---
    const state = {
      currentPage: 'products',
      apiKey: localStorage.getItem('adminApiKey') || '',
      baseURL: window.location.origin,
    };

    // --- DOM helpers (make global for page fragments) ---
    window.$ = (sel) => document.querySelector(sel);
    window.$$ = (sel) => Array.from(document.querySelectorAll(sel));
    
    const $ = window.$;
    const $$ = window.$$;

    // --- Toast ---
    let toastTimer;
    window.toast = function toast(message, type = 'success') {
      const el = $('#toast');
      el.querySelector('div').textContent = message;
      el.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.add('hidden'), 3000);
    };

    // --- API helpers ---
    window.apiRequest = async function apiRequest(endpoint, options = {}) {
      const url = `${state.baseURL}${endpoint}`;
      const headers = {
        'Content-Type': 'application/json',
        'X-API-Key': state.apiKey,
        ...options.headers,
      };

      try {
        const response = await fetch(url, { ...options, headers });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'API request failed');
        }

        return data;
      } catch (error) {
        console.error('API Error:', error);
        toast(error.message, 'error');
        throw error;
      }
    };

    // --- Navigation ---
    function setActiveNav(page) {
      state.currentPage = page;
      $$('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.page === page);
      });
    }

    function showMobileMenu() {
      $('#mobileMenu').classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function hideMobileMenu() {
      $('#mobileMenu').classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

    // --- Auth ---
    function logout() {
      localStorage.removeItem('adminApiKey');
      window.location.href = '/admin/login';
    }

    // --- Page loading ---
    async function loadPage(page) {
      setActiveNav(page);
      $('#pageContent').innerHTML = `
        <div class="flex items-center justify-center py-12">
          <div class="text-center">
            <div class="mx-auto h-8 w-8 animate-spin rounded-full border-2 border-zinc-900 border-t-transparent"></div>
            <p class="mt-3 text-sm text-zinc-600">Loading...</p>
          </div>
        </div>
      `;

      try {
        const response = await fetch(`/admin/${page}`);
        if (!response.ok) throw new Error('Page not found');
        const html = await response.text();
        
        // Create a temporary div to parse HTML
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        
        // Extract and remove script tags
        const scripts = tempDiv.querySelectorAll('script');
        const scriptContents = Array.from(scripts).map(script => script.textContent);
        scripts.forEach(script => script.remove());
        
        // Insert the HTML without scripts
        $('#pageContent').innerHTML = tempDiv.innerHTML;
        
        // Execute the scripts in order
        scriptContents.forEach(scriptContent => {
          try {
            const scriptFunc = new Function(scriptContent);
            scriptFunc();
          } catch (error) {
            console.error('Script execution error:', error);
          }
        });

        // Update URL without reload
        history.pushState({ page }, '', `/admin${page === 'products' ? '' : '/' + page}`);

        // Initialize page-specific functionality if available
        if (window[`init${page.charAt(0).toUpperCase() + page.slice(1)}Page`]) {
          window[`init${page.charAt(0).toUpperCase() + page.slice(1)}Page`]();
        }
      } catch (error) {
        $('#pageContent').innerHTML = `
          <div class="rounded-3xl border border-red-200 bg-red-50 p-6 text-center">
            <p class="text-sm text-red-700">Failed to load page: ${error.message}</p>
          </div>
        `;
      }
    }

    // --- Init ---
    function init() {
      // Check if logged in
      if (!state.apiKey) {
        window.location.href = '/admin/login';
        return;
      }

      // Mobile menu
      $('#mobileMenu').addEventListener('click', (e) => {
        if (e.target.matches('[data-close]')) hideMobileMenu();
      });

      // Logout
      $('#logoutBtn').addEventListener('click', logout);

      // Navigation
      $$('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const page = link.dataset.page;
          loadPage(page);
        });
      });

      // Handle browser back/forward
      window.addEventListener('popstate', (e) => {
        if (e.state && e.state.page) {
          loadPage(e.state.page);
        }
      });

      // Determine initial page from URL
      const path = window.location.pathname;
      let initialPage = 'products';
      if (path.includes('/orders')) {
        initialPage = 'orders';
      }

      loadPage(initialPage);
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
