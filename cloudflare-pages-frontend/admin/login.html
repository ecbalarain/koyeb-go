<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OXLOOK Admin Login</title>
  <!-- Tailwind (standalone) -->
  <script src="/tw.js"></script>
</head>
<body class="min-h-screen bg-zinc-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="rounded-3xl border border-zinc-200 bg-white p-8 shadow-sm">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-semibold tracking-tight">OXLOOK Admin</h1>
        <p class="mt-2 text-sm text-zinc-600">Enter your API key to continue</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label for="apiKey" class="form-label">API Key</label>
          <input
            type="password"
            id="apiKey"
            class="form-input"
            placeholder="Enter your admin API key"
            required
          />
        </div>

        <button type="submit" class="w-full btn-primary">
          Login
        </button>
      </form>

      <div id="error" class="mt-4 hidden rounded-2xl border border-red-200 bg-red-50 p-3">
        <p class="text-sm text-red-700"></p>
      </div>
    </div>

    <p class="mt-6 text-center text-xs text-zinc-500">
      Secure admin access for OXLOOK e-commerce platform
    </p>
  </div>

  <style>
    .form-input {
      @apply w-full rounded-2xl border border-zinc-200 bg-white px-3 py-2.5 text-sm shadow-sm placeholder:text-zinc-400 focus:border-zinc-300 focus:outline-none focus:ring-4 focus:ring-zinc-900/10;
    }

    .form-label {
      @apply block text-sm font-medium text-zinc-700 mb-1.5;
    }

    .btn-primary {
      @apply rounded-2xl bg-zinc-900 px-4 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-zinc-800 focus:outline-none focus:ring-4 focus:ring-zinc-900/20;
    }
  </style>

  <script>
    const $ = (sel) => document.querySelector(sel);

    // Check if already logged in with a valid token
    const existingToken = localStorage.getItem('adminToken');
    if (existingToken) {
      // Verify token is not expired by checking expiry
      const expiry = localStorage.getItem('adminTokenExpiry');
      if (expiry && new Date(expiry) > new Date()) {
        window.location.href = '/admin';
      } else {
        // Token expired, clean up
        localStorage.removeItem('adminToken');
        localStorage.removeItem('adminTokenExpiry');
        localStorage.removeItem('adminApiKey');
      }
    }

    $('#loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const apiKey = $('#apiKey').value.trim();
      if (!apiKey) return;

      const errorEl = $('#error');
      const errorText = errorEl.querySelector('p');

      try {
        // Authenticate with API key and get JWT token
        const response = await fetch('/admin/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ api_key: apiKey }),
        });

        const data = await response.json();

        if (response.ok) {
          // Store JWT token
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminTokenExpiry', data.expires_at);
          // Remove legacy API key if present
          localStorage.removeItem('adminApiKey');
          window.location.href = '/admin';
        } else {
          throw new Error(data.error || 'Invalid API key');
        }
      } catch (error) {
        errorText.textContent = error.message;
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
