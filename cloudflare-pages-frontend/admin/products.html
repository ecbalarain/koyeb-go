<div class="space-y-6">
  <!-- Header -->
  <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <h1 class="text-2xl font-semibold tracking-tight">Products</h1>
      <p class="mt-1 text-sm text-zinc-600">Manage your product catalog</p>
    </div>
    <div class="flex gap-2">
      <button id="addProductBtn" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        Add Product
      </button>
      <button id="refreshBtn" class="btn-secondary">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- Products grid -->
  <div id="productsGrid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <!-- Products will be loaded here -->
  </div>

  <!-- Empty state -->
  <div id="emptyState" class="hidden rounded-3xl border border-zinc-200 bg-white p-12 text-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-zinc-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21V7a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v14"/><path d="M4 21h16"/><path d="M9 11h6"/><path d="M9 15h6"/></svg>
    <h3 class="mt-4 text-lg font-medium text-zinc-900">No products found</h3>
    <p class="mt-2 text-sm text-zinc-600">Get started by adding your first product.</p>
  </div>

  <!-- Product form modal -->
  <div id="productModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-zinc-900/50" onclick="closeProductModal()"></div>
    <div class="absolute inset-4 overflow-auto">
      <div class="mx-auto max-w-2xl">
        <div class="rounded-3xl border border-zinc-200 bg-white p-6 shadow-2xl">
          <div class="mb-4 flex items-center justify-between">
            <h3 class="text-lg font-semibold" id="modalTitle">Add Product</h3>
            <button onclick="closeProductModal()" class="rounded-xl p-2 hover:bg-zinc-100 focus:outline-none focus:ring-2 focus:ring-zinc-900/20" aria-label="Close">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
            </button>
          </div>
          
          <form id="productForm" class="space-y-4">
            <input type="hidden" id="productId" />
            
            <div>
              <label class="block text-sm font-medium text-zinc-900">Name</label>
              <input type="text" id="productName" required class="mt-1 w-full rounded-2xl border border-zinc-200 bg-white px-3 py-2.5 text-sm shadow-sm placeholder:text-zinc-400 focus:border-zinc-300 focus:outline-none focus:ring-4 focus:ring-zinc-900/10" placeholder="Product name" />
            </div>

            <div>
              <label class="block text-sm font-medium text-zinc-900">Slug</label>
              <input type="text" id="productSlug" required class="mt-1 w-full rounded-2xl border border-zinc-200 bg-white px-3 py-2.5 text-sm shadow-sm placeholder:text-zinc-400 focus:border-zinc-300 focus:outline-none focus:ring-4 focus:ring-zinc-900/10" placeholder="product-slug" />
              <p class="mt-1 text-xs text-zinc-500">URL-friendly identifier (e.g., "wireless-charger")</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-zinc-900">Category</label>
              <select id="productCategory" required class="mt-1 w-full rounded-2xl border border-zinc-200 bg-white px-3 py-2.5 text-sm shadow-sm focus:border-zinc-300 focus:outline-none focus:ring-4 focus:ring-zinc-900/10">
                <option value="">Select category</option>
                <option value="Basics">Basics</option>
                <option value="Home">Home</option>
                <option value="Tech">Tech</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-zinc-900">Description</label>
              <textarea id="productDescription" rows="3" class="mt-1 w-full rounded-2xl border border-zinc-200 bg-white px-3 py-2.5 text-sm shadow-sm placeholder:text-zinc-400 focus:border-zinc-300 focus:outline-none focus:ring-4 focus:ring-zinc-900/10" placeholder="Product description"></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-zinc-900">Images (JSON array)</label>
              <input type="text" id="productImages" class="mt-1 w-full rounded-2xl border border-zinc-200 bg-white px-3 py-2.5 text-sm shadow-sm placeholder:text-zinc-400 focus:border-zinc-300 focus:outline-none focus:ring-4 focus:ring-zinc-900/10" placeholder='["/images/product.jpg"]' />
              <p class="mt-1 text-xs text-zinc-500">JSON array of image URLs</p>
            </div>

            <div class="flex gap-2 pt-2">
              <button type="submit" class="flex-1 btn-primary">Save Product</button>
              <button type="button" onclick="closeProductModal()" class="flex-1 btn-secondary">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let products = [];

  // --- Product card template ---
  function productCard(product) {
    const statusClass = product.active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
    const statusText = product.active ? 'Active' : 'Inactive';

    return `
      <div class="rounded-3xl border border-zinc-200 bg-white p-6 shadow-sm">
        <div class="flex items-start justify-between mb-4">
          <div class="flex-1 min-w-0">
            <h3 class="text-lg font-medium text-zinc-900 truncate">${product.name}</h3>
            <p class="text-sm text-zinc-600 truncate">${product.category}</p>
            <p class="text-xs text-zinc-500 mt-1">Slug: ${product.slug}</p>
          </div>
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${statusClass} ml-3">
            ${statusText}
          </span>
        </div>

        <div class="space-y-3">
          <div class="flex items-center justify-between text-sm">
            <span class="text-zinc-600">Variants</span>
            <a href="/admin/products/${product.id}/variants" class="text-zinc-900 hover:text-zinc-700 font-medium">
              Manage →
            </a>
          </div>

          <div class="flex items-center justify-between gap-2">
            <button
              onclick="editProduct(${product.id})"
              class="flex-1 rounded-2xl border border-zinc-200 bg-white px-3 py-2 text-sm font-medium text-zinc-800 shadow-sm hover:bg-zinc-50 focus:outline-none focus:ring-2 focus:ring-zinc-900/10"
            >
              Edit
            </button>
            <button
              onclick="toggleProductStatus(${product.id}, ${product.active})"
              class="flex-1 rounded-2xl ${product.active ? 'border border-zinc-200 bg-white text-zinc-800' : 'bg-zinc-900 text-white'} px-3 py-2 text-sm font-medium shadow-sm hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-zinc-900/10"
            >
              ${product.active ? 'Deactivate' : 'Activate'}
            </button>
          </div>
        </div>
      </div>
    `;
  }

  // --- Load products ---
  async function loadProducts() {
    try {
      const data = await apiRequest('/admin/api/products');
      products = data;
      renderProducts();
    } catch (error) {
      console.error('Failed to load products:', error);
    }
  }

  // --- Render products ---
  function renderProducts() {
    const grid = $('#productsGrid');
    const empty = $('#emptyState');

    if (products.length === 0) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
    } else {
      empty.classList.add('hidden');
      grid.innerHTML = products.map(productCard).join('');
    }
  }

  // --- Toggle product status ---
  async function toggleProductStatus(productId, currentStatus) {
    try {
      await apiRequest(`/admin/api/products/${productId}`, {
        method: 'PATCH',
      });

      // Update local data
      const product = products.find(p => p.id === productId);
      if (product) {
        product.active = !currentStatus;
        renderProducts();
        toast(`Product ${product.active ? 'activated' : 'deactivated'}`);
      }
    } catch (error) {
      console.error('Failed to toggle product status:', error);
    }
  }

  // --- Product modal ---
  let editingProductId = null;

  function openProductModal(productId = null) {
    editingProductId = productId;
    
    if (productId) {
      // Edit mode
      const product = products.find(p => p.id === productId);
      if (product) {
        $('#modalTitle').textContent = 'Edit Product';
        $('#productId').value = product.id;
        $('#productName').value = product.name;
        $('#productSlug').value = product.slug;
        $('#productCategory').value = product.category;
        $('#productDescription').value = product.description || '';
        $('#productImages').value = product.images || '[]';
      }
    } else {
      // Add mode
      $('#modalTitle').textContent = 'Add Product';
      $('#productForm').reset();
      $('#productId').value = '';
    }
    
    $('#productModal').classList.remove('hidden');
    document.body.classList.add('overflow-hidden');
  }

  function closeProductModal() {
    $('#productModal').classList.add('hidden');
    document.body.classList.remove('overflow-hidden');
    editingProductId = null;
  }

  async function editProduct(productId) {
    openProductModal(productId);
  }

  // --- Form submission ---
  async function handleProductSubmit(e) {
    e.preventDefault();
    
    const formData = {
      name: $('#productName').value.trim(),
      slug: $('#productSlug').value.trim(),
      category: $('#productCategory').value,
      description: $('#productDescription').value.trim(),
      images: $('#productImages').value.trim() || '[]',
    };

    // Validate images is valid JSON
    try {
      JSON.parse(formData.images);
    } catch (error) {
      toast('Images must be valid JSON array', 'error');
      return;
    }

    try {
      if (editingProductId) {
        // Update existing product
        await apiRequest(`/admin/api/products/${editingProductId}`, {
          method: 'PUT',
          body: JSON.stringify(formData),
        });
        toast('Product updated successfully');
      } else {
        // Create new product
        await apiRequest('/admin/api/products', {
          method: 'POST',
          body: JSON.stringify(formData),
        });
        toast('Product created successfully');
      }
      
      closeProductModal();
      loadProducts();
    } catch (error) {
      console.error('Failed to save product:', error);
      toast(error.message || 'Failed to save product', 'error');
    }
  }

  // --- Auto-generate slug from name ---
  function setupSlugGeneration() {
    const nameInput = $('#productName');
    const slugInput = $('#productSlug');
    
    nameInput.addEventListener('input', (e) => {
      if (!editingProductId && slugInput.value === '') {
        const slug = e.target.value
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '');
        slugInput.value = slug;
      }
    });
  }

  // --- Initialize ---
  function initProductsPage() {
    $('#refreshBtn').addEventListener('click', loadProducts);
    $('#addProductBtn').addEventListener('click', () => openProductModal());
    $('#productForm').addEventListener('submit', handleProductSubmit);
    setupSlugGeneration();
    loadProducts();
  }

  // Make functions globally available
  window.initProductsPage = initProductsPage;
  window.toggleProductStatus = toggleProductStatus;
  window.editProduct = editProduct;
  window.closeProductModal = closeProductModal;
</script>
