<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Status - Oxlook</title>

  <!-- SEO & Performance -->
  <meta name="description" content="Check your order status at Oxlook." />
  <link rel="icon" href="assets/favicon.png" type="image/png" />

  <!-- Preconnect to improve performance -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <link rel="dns-prefetch" href="https://api.bhomanshah.com" />

  <!-- Tailwind (standalone) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900">
  <!-- Top bar -->
  <header class="border-b border-zinc-200/70 bg-white">
    <div class="mx-auto max-w-6xl px-4 sm:px-6">
      <!-- Header row -->
      <div class="flex flex-col items-center py-6">
        <!-- Logo -->
        <a href="/" class="tap flex flex-col items-center gap-3" aria-label="Oxlook Home">
          <img
            src="assets/logo.jpg"
            alt="Oxlook"
            class="h-20 w-auto max-w-[220px] object-contain"
            loading="eager"
          />
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="mx-auto max-w-2xl px-4 py-12 sm:px-6">
    <!-- Loading State -->
    <div id="loading" class="text-center">
      <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-zinc-300 border-t-zinc-600"></div>
      <p class="mt-4 text-zinc-600">Loading order details...</p>
    </div>

    <!-- Error State -->
    <div id="error" class="hidden text-center">
      <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-red-100">
        <svg class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
        </svg>
      </div>
      <h1 class="mb-2 text-2xl font-bold text-zinc-900">Order Not Found</h1>
      <p id="errorMessage" class="text-zinc-600">We couldn't find your order. Please check your email link or contact support.</p>
      <a href="/" class="mt-6 inline-block rounded-lg bg-zinc-900 px-6 py-3 text-sm font-medium text-white hover:bg-zinc-800">
        Continue Shopping
      </a>
    </div>

    <!-- Order Details -->
    <div id="orderDetails" class="hidden">
      <!-- Order Header -->
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-green-100">
          <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-zinc-900">Order Confirmed!</h1>
        <p class="mt-2 text-zinc-600">Thank you for your order. Here are the details:</p>
      </div>

      <!-- Order Info -->
      <div class="mb-8 rounded-lg border border-zinc-200 bg-white p-6">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <p class="text-sm text-zinc-500">Order ID</p>
            <p id="orderId" class="font-medium text-zinc-900"></p>
          </div>
          <div>
            <p class="text-sm text-zinc-500">Status</p>
            <span id="orderStatus" class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium"></span>
          </div>
          <div>
            <p class="text-sm text-zinc-500">Total</p>
            <p id="orderTotal" class="font-medium text-zinc-900"></p>
          </div>
          <div>
            <p class="text-sm text-zinc-500">Date</p>
            <p id="orderDate" class="font-medium text-zinc-900"></p>
          </div>
        </div>
      </div>

      <!-- Order Items -->
      <div class="rounded-lg border border-zinc-200 bg-white p-6">
        <h2 class="mb-4 text-lg font-medium text-zinc-900">Order Items</h2>
        <div id="orderItems" class="space-y-4">
          <!-- Items will be populated here -->
        </div>
      </div>

      <!-- Actions -->
      <div class="mt-8 text-center">
        <a href="/" class="inline-block rounded-lg bg-zinc-900 px-6 py-3 text-sm font-medium text-white hover:bg-zinc-800">
          Continue Shopping
        </a>
      </div>
    </div>
  </main>

  <script>
    // Get URL parameters
    function getUrlParameter(name) {
      name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
      const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
      const results = regex.exec(location.search);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    // Format currency
    function formatCurrency(amount) {
      return 'PKR ' + amount.toLocaleString();
    }

    // Format date
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Get status badge
    function getStatusBadge(status) {
      const statusClasses = {
        'new': 'bg-blue-100 text-blue-800',
        'confirmed': 'bg-yellow-100 text-yellow-800',
        'shipped': 'bg-purple-100 text-purple-800',
        'delivered': 'bg-green-100 text-green-800',
        'canceled': 'bg-red-100 text-red-800'
      };

      return statusClasses[status] || 'bg-gray-100 text-gray-800';
    }

    // Load order details
    async function loadOrderDetails() {
      const orderId = getUrlParameter('order_id');
      const email = getUrlParameter('email');

      if (!orderId || !email) {
        showError('Invalid order link. Please check your email for the correct link.');
        return;
      }

      try {
        const response = await fetch(`https://api.bhomanshah.com/api/order-status/${orderId}?email=${encodeURIComponent(email)}`);
        const data = await response.json();

        if (data.error) {
          showError(data.error);
          return;
        }

        displayOrderDetails(data);
      } catch (error) {
        showError('Failed to load order details. Please try again later.');
      }
    }

    // Display order details
    function displayOrderDetails(data) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('orderDetails').classList.remove('hidden');

      // Order info
      document.getElementById('orderId').textContent = '#' + data.order.id;
      document.getElementById('orderStatus').textContent = data.order.status.charAt(0).toUpperCase() + data.order.status.slice(1);
      document.getElementById('orderStatus').className = 'inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ' + getStatusBadge(data.order.status);
      document.getElementById('orderTotal').textContent = formatCurrency(data.order.total);
      document.getElementById('orderDate').textContent = formatDate(data.order.created_at);

      // Order items
      const itemsContainer = document.getElementById('orderItems');
      data.items.forEach(item => {
        const itemElement = document.createElement('div');
        itemElement.className = 'flex items-center justify-between border-b border-zinc-100 pb-4 last:border-b-0 last:pb-0';
        itemElement.innerHTML = `
          <div class="flex-1">
            <h3 class="font-medium text-zinc-900">${item.product_name}</h3>
            <p class="text-sm text-zinc-500">${item.variant_label}</p>
            <p class="text-sm text-zinc-500">Quantity: ${item.qty}</p>
          </div>
          <div class="text-right">
            <p class="font-medium text-zinc-900">${formatCurrency(item.price_at_purchase)}</p>
          </div>
        `;
        itemsContainer.appendChild(itemElement);
      });
    }

    // Show error
    function showError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('errorMessage').textContent = message;
    }

    // Initialize
    loadOrderDetails();
  </script>
</body>
</html>
